# docker-compose.test.yml is used to spin up the app specifically for integration testing.

services:
  postgres:
    image: postgres:16
    networks:
      - hmpps
    tmpfs:
      - /var/lib/postgresql/data
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: postgres

  annual-leave-api:
    image: ghcr.io/ministryofjustice/annual-leave-apprenticeship-project-api:latest
    networks:
      - hmpps
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 5s
      retries: 20
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      APP_DB_ENDPOINT: postgres:5432

  ui:
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    command: npm run start
    depends_on:
      annual-leave-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      ENVIRONMENT_NAME: dev
      PRODUCT_ID: UNASSIGNED
      REDIS_ENABLED: false
      REDIS_HOST: redis
      SESSION_SECRET: somesecretvalue
      TOKEN_VERIFICATION_ENABLED: false
      ANNUAL_LEAVE_API_URL: http://annual-leave-api:8080
      NO_HTTPS: true
      INGRESS_URL: http://ui:3000

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    networks:
      - hmpps
    depends_on:
      - ui
    environment:
      CI: true
      BASE_URL: http://ui:3000
      DB_HOST: postgres
    working_dir: /playwright
    command: npx playwright test
    volumes:
      - ../package.json:/playwright/package.json
      - ../package-lock.json:/playwright/package-lock.json
      - ../playwright.config.ts:/playwright/playwright.config.ts
      - ../integration_tests:/playwright/integration_tests
      - ../test_results:/playwright/test_results
      - node_modules:/playwright/node_modules

volumes:
  node_modules:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_node_modules
